<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Заполнение профиля</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--tg-theme-bg-color, #ffffff);
            color: var(--tg-theme-text-color, #222222);
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        .form-group {
            width: 100%;
            max-width: 400px;
            margin-bottom: 15px;
        }
        label {
            display: block;
            margin-bottom: 5px;
            font-weight: bold;
            color: var(--tg-theme-hint-color, #777777);
        }
        input, select {
            width: 100%;
            padding: 10px;
            border: 1px solid var(--tg-theme-hint-color, #ccc);
            border-radius: 8px;
            background-color: var(--tg-theme-secondary-bg-color, #fafafa);
            color: var(--tg-theme-text-color, #222222);
            box-sizing: border-box;
        }
        button {
            width: 100%;
            max-width: 400px;
            padding: 12px;
            border: none;
            border-radius: 8px;
            background-color: var(--tg-theme-button-color, #248bcf);
            color: var(--tg-theme-button-text-color, #ffffff);
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            margin-top: 15px;
        }
    </style>
</head>
<body>

    <h2>Заполнение профиля</h2>

    <div class="form-group">
        <label for="name">Ваше имя</label>
        <input type="text" id="name" placeholder="Введите имя">
    </div>

    <div class="form-group">
        <label for="height">Рост (см)</label>
        <input type="number" id="height" placeholder="Например, 175">
    </div>

    <div class="form-group">
        <label for="weight">Вес (кг)</label>
        <input type="number" id="weight" placeholder="Например, 70">
    </div>

    <div class="form-group">
        <label for="goal">Главная цель</label>
        <select id="goal">
            <option value="Похудение">Похудение</option>
            <option value="Набор массы">Набор массы</option>
            <option value="Поддержание формы">Поддержание формы</option>
        </select>
    </div>

    <button id="sendBtn">Сохранить данные</button>

    <script>
        const tg = window.Telegram.WebApp;
        tg.ready();
        tg.expand();

        document.getElementById('sendBtn').addEventListener('click', () => {
            const name = document.getElementById('name').value;
            const height = document.getElementById('height').value;
            const weight = document.getElementById('weight').value;
            const goal = document.getElementById('goal').value;

            if (!name || !height || !weight) {
                alert('Пожалуйста, заполните все поля!');
                return;
            }

            const data = {
                name: name,
                height: height,
                weight: weight,
                goal: goal
            };

            // Отправляем данные напрямую в чат Telegram
            tg.sendData(JSON.stringify(data));
        });
    </script>
</body>
</html>
