<!DOCTYPE html>
<html>
<head>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
</head>
<body>
    <h1>Привет, Web App!</h1>
    <button onclick="closeApp()">Закрыть</button>
    <script>
        let tg = window.Telegram.WebApp;
        tg.ready();
        function closeApp() { tg.close(); }
    </script>
</body>
</html>
